<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

    body { background: #000; color: #fff; font-family: sans-serif; margin: 0; overflow-x: hidden; }

    #channel-display { text-align: center; color: #FFD700; background: #000; padding: 8px; font-weight: bold; font-size: clamp(14px, 3vw, 18px); border-bottom: 2px solid #FFD700; }
    
    .video-container { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; overflow: hidden; }
    
    #category-badge {
        position: absolute; top: 15px; left: 15px; z-index: 2147483647;
        background: transparent !important; color: #FFD700;
        padding: 5px 10px; font-size: clamp(12px, 2vw, 14px); font-weight: bold;
        text-transform: uppercase; text-shadow: 2px 2px 4px #000;
        pointer-events: none;
    }

    #fs-channel-title {
        position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        z-index: 2147483646; color: #FFD700; font-weight: bold;
        text-shadow: 2px 2px 8px #000; opacity: 0; transition: opacity 0.5s;
        pointer-events: none; text-align: center; width: 90%; white-space: nowrap;
        font-size: clamp(14px, 5vw, 28px);
    }
    
    /* Subtitle Display Overlay */
    #subtitle-overlay {
      position: absolute; bottom: 85px; left: 50%; transform: translateX(-50%);
      z-index: 2147483646; color: #FFD700; background: transparent;
      padding: 0; font-size: clamp(14px, 3vw, 22px); font-weight: bold;
      text-align: center; max-width: 90%; display: none;
      pointer-events: none; text-shadow: 2px 2px 6px #000, 0 0 2px #000; line-height: 1.4;
      white-space: pre-line;
    }
    .video-container.cc-active #subtitle-overlay { display: block; }
    
    /* Netflix-Style Custom Player Control Overlay (Fast Transient Fader) */
    #archive-controls-bar {
      position: absolute; bottom: 0; left: 0; width: 100%; z-index: 2147483647;
      background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.7) 70%, transparent 100%);
      padding: 20px 20px 12px 20px; box-sizing: border-box; display: flex;
      flex-direction: column; gap: 10px; opacity: 0; transition: opacity 0.25s ease-in-out;
      pointer-events: none; backdrop-filter: blur(2px);
    }

    /* Fast transient behavior: controls display when active, fade quickly on idle */
    .video-container.active-user #archive-controls-bar,
    .video-container:hover #archive-controls-bar { opacity: 1; pointer-events: auto; }

    /* Track Seeker (Scrubber) */
    .seek-container { width: 100%; display: flex; align-items: center; position: relative; }
    #video-seekbar {
      -webkit-appearance: none; width: 100%; height: 6px; background: rgba(255,255,255,0.3);
      border-radius: 3px; outline: none; cursor: pointer; transition: height 0.1s;
    }
    #video-seekbar:hover { height: 9px; }
    #video-seekbar::-webkit-slider-thumb {
      -webkit-appearance: none; width: 16px; height: 16px; background: #FFD700;
      border-radius: 50%; cursor: pointer; box-shadow: 0 0 6px rgba(0,0,0,0.8);
    }

    /* Netflix Controls Row Elements */
    .netflix-row { display: flex; justify-content: space-between; align-items: center; width: 100%; flex-wrap: wrap; gap: 8px; }
    .netflix-group { display: flex; align-items: center; gap: 12px; }

    .net-btn {
      background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(255, 215, 0, 0.4); color: #FFD700; cursor: pointer; font-size: 14px;
      font-weight: bold; padding: 6px 12px; display: flex; align-items: center; justify-content: center;
      border-radius: 20px; transition: all 0.2s ease; text-shadow: 1px 1px 3px #000;
      box-shadow: 0 2px 6px rgba(0,0,0,0.5);
    }
    .net-btn:hover { background: #FFD700; color: #000; transform: scale(1.05); box-shadow: 0 0 10px rgba(255, 215, 0, 0.6); }

    /* Volume Slider Wrapper */
    .volume-wrapper { display: flex; align-items: center; gap: 8px; position: relative; background: rgba(0,0,0,0.6); padding: 4px 10px; border-radius: 20px; border: 1px solid rgba(255,215,0,0.4); }
    #volume-slider {
      -webkit-appearance: none; width: 70px; height: 4px; background: rgba(255,255,255,0.4);
      border-radius: 2px; outline: none; cursor: pointer;
    }
    #volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none; width: 12px; height: 12px; background: #FFD700; border-radius: 50%; cursor: pointer;
    }

    .time-display { font-size: 13px; color: #FFD700; font-weight: bold; font-family: monospace; text-shadow: 1px 1px 2px #000; }

    .nav-box { display: flex; justify-content: space-between; padding: 10px; }
    .nav-btn { background: #FFD700; color: #000; border: none; padding: 12px 24px; cursor: pointer; font-weight: bold; width: 48%; border-radius: 4px; }

      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 2147483645; background: transparent; display: none;
    }
    .video-container.fullscreen-mode #click-shield { display: block; }
    .video-container.fullscreen-mode.active-user #click-shield { pointer-events: none; }

    #unmute-prompt-overlay {

    #archive-player {

    #now-playing-section {

      font-weight: bold;

      color: #FFD700;

      letter-spacing: 0.5px;

  }

  function getLiveVirtualTimeline(channelIndex) {
    let masterEpochs = JSON.parse(localStorage.getItem(GLOBAL_EPOCH_KEY)) || {};
    let now = Math.floor(Date.now() / 1000);

    if (!masterEpochs[channelIndex]) {
      masterEpochs[channelIndex] = {
        catalogIdx: channelIndex % stationData.length,
        startTime: now
      };
      localStorage.setItem(GLOBAL_EPOCH_KEY, JSON.stringify(masterEpochs));
    }

    let channelProg = masterEpochs[channelIndex];
    if (channelProg.catalogIdx >= stationData.length) {
      channelProg.catalogIdx = 0;
    }

    let currentStation = stationData[channelProg.catalogIdx];
    let elapsedTotal = now - channelProg.startTime;

    while (elapsedTotal >= currentStation.duration) {
      elapsedTotal -= currentStation.duration;
      channelProg.catalogIdx = (channelProg.catalogIdx + 1) % stationData.length;
      channelProg.startTime = now - elapsedTotal;
      currentStation = stationData[channelProg.catalogIdx];
      localStorage.setItem(GLOBAL_EPOCH_KEY, JSON.stringify(masterEpochs));
    }

    return {
      catalogIdx: channelProg.catalogIdx,
      offset: elapsedTotal
    };
  }

  // Play/Pause Control
  function toggleArchivePlayPause() {
    const station = stationData[currentActiveCatalogIdx];
    if (station.type === 'archive') {
      if (archiveVideo.paused) {
        archiveVideo.play();
        playPauseBtn.innerText = "❚❚";
      } else {
        archiveVideo.pause();
        playPauseBtn.innerText = "▶";
      }
    } else {
      if (playPauseBtn.innerText === "❚❚") {
        playPauseBtn.innerText = "▶";
      } else {
        playPauseBtn.innerText = "❚❚";
      }
    }
  }

  // Mute/Unmute Control
  function toggleArchiveMute() {
    const station = stationData[currentActiveCatalogIdx];
    if (station.type === 'archive') {
      if (archiveVideo.muted || archiveVideo.volume === 0) {
        archiveVideo.muted = false;
        if (archiveVideo.volume === 0) {
          archiveVideo.volume = 1;
          volumeSlider.value = 1;
        }
        muteBtn.innerText = "🔊";
      } else {
        archiveVideo.muted = true;
        muteBtn.innerText = "🔇";
      }
    } else {
      if (muteBtn.innerText === "🔇") {
        muteBtn.innerText = "🔊";
        unmutePrompt.style.display = 'block';
        setTimeout(hideUnmutePrompt, 3000);
      } else {
        muteBtn.innerText = "🔇";
        unmutePrompt.style.display = 'none';
      }
    }
  }

  function hideUnmutePrompt() {
    unmutePrompt.style.display = 'none';
  }

  function adjustVolume(val) {
    const station = stationData[currentActiveCatalogIdx];
    if (station.type === 'archive') {
      archiveVideo.volume = val;
      archiveVideo.muted = (val == 0);
    }
    muteBtn.innerText = (val == 0) ? "🔇" : "🔊";
  }

  function formatTime(secs) {
    let m = Math.floor(secs / 60);
    let s = Math.floor(secs % 60);
    return m + ":" + (s < 10 ? "0" : "") + s;
  }

  // Scrubber interaction
  videoSeekbar.addEventListener('input', () => {
    const station = stationData[currentActiveCatalogIdx];
    if (station.type === 'archive') {
      let newTime = (videoSeekbar.value / 100) * station.duration;
      archiveVideo.currentTime = newTime;
      playbackSeconds = Math.floor(newTime);
    }
  });

  function playStation(channelIndex) {
    currentIndex = channelIndex;
    let liveState = getLiveVirtualTimeline(channelIndex);
    currentActiveCatalogIdx = liveState.catalogIdx;
    
    const station = stationData[currentActiveCatalogIdx];
    playbackSeconds = liveState.offset;
    hideUnmutePrompt();
    
    if (station.type === 'archive') {
      iframe.style.display = 'none';
      iframe.src = '';
      seekbarWrapper.style.display = 'flex';
      
      archiveVideo.style.display = 'block';
      archiveVideo.src = station.embed;
      archiveVideo.currentTime = playbackSeconds;
      archiveVideo.muted = false; 
      archiveVideo.volume = volumeSlider.value;
      muteBtn.innerText = (archiveVideo.volume == 0) ? "🔇" : "🔊";
      
      archiveVideo.play().then(() => {
        playPauseBtn.innerText = "❚❚";
      }).catch(() => {
        archiveVideo.muted = true;
        muteBtn.innerText = "🔇";
        archiveVideo.play();
        playPauseBtn.innerText = "❚❚";
      });
    } else {
      archiveVideo.style.display = 'none';
      archiveVideo.pause();
      archiveVideo.src = '';
      seekbarWrapper.style.display = 'none';
      
      iframe.style.display = 'block';
      let cleanUrl = `${station.embed}&start=${playbackSeconds}`;
      iframe.src = cleanUrl;
      playPauseBtn.innerText = "❚❚";
      muteBtn.innerText = "🔇";
    }
    
    display.innerText = station.name;
    nowPlayingLabel.innerText = "Now Playing: " + station.name;
    
    localStorage.setItem('dap_247_last_channel', channelIndex);
    
    titleOverlay.innerText = station.name;
    titleOverlay.style.opacity = 1;
    setTimeout(() => { titleOverlay.style.opacity = 0; }, 2000);

    clearInterval(subtitleTimer);
    updateSubtitles(playbackSeconds);
    
    subtitleTimer = setInterval(() => {
      playbackSeconds++;
      
      if (station.type === 'archive' && !archiveVideo.paused) {
        let percent = (archiveVideo.currentTime / station.duration) * 100;
        videoSeekbar.value = percent || 0;
        timeIndicator.innerText = formatTime(archiveVideo.currentTime) + " / " + formatTime(station.duration);
      } else {
        timeIndicator.innerText = formatTime(playbackSeconds) + " / " + formatTime(station.duration);
      }
      
      let checkState = getLiveVirtualTimeline(currentIndex);
      if (checkState.catalogIdx !== currentActiveCatalogIdx) {
        playStation(currentIndex);
        return;
      }
      
      updateSubtitles(playbackSeconds);
    }, 1000);
  }

  function nav(direction) {
    let nextIdx = (currentIndex + direction + TOTAL_CHANNELS) % TOTAL_CHANNELS;
    playStation(nextIdx);
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === "ArrowUp" || e.key === "ArrowLeft") { e.preventDefault(); nav(-1); }
    if (e.key === "ArrowDown" || e.key === "ArrowRight") { e.preventDefault(); nav(1); }
  });

  function toggleFullScreen() {
    if (!document.fullscreenElement && !document.webkitFullscreenElement) {
      if (wrapper.requestFullscreen) {
        wrapper.requestFullscreen();
      } else if (wrapper.webkitRequestFullscreen) {
        wrapper.webkitRequestFullscreen();
      }
    } else {
      if (document.exitFullscreen) {
        document.exitFullscreen();
      } else if (document.webkitExitFullscreen) {
        document.webkitExitFullscreen();
      }
    }
  }

  function checkFullscreen() {
    if (document.fullscreenElement || document.webkitFullscreenElement) {
        wrapper.classList.add('fullscreen-mode');
        fsExitBtn.innerText = "⛶ EXIT";
        triggerActivity();
    } else {
        wrapper.classList.remove('fullscreen-mode');
        wrapper.classList.remove('active-user');
        fsExitBtn.innerText = "FULLSCREEN";
    }
  }

  document.addEventListener('fullscreenchange', checkFullscreen);
  document.addEventListener('webkitfullscreenchange', checkFullscreen);

  // Fast transient timer (1.5s fade out delay)
  let fadeTimer = null;
  function triggerActivity() {
    wrapper.classList.add('active-user');
    clearTimeout(fadeTimer);
    fadeTimer = setTimeout(() => {
      wrapper.classList.remove('active-user');
    }, 1500);
  }

  wrapper.addEventListener('mousemove', triggerActivity);
  wrapper.addEventListener('mousedown', triggerActivity);
  wrapper.addEventListener('touchstart', triggerActivity, { passive: true });

  const savedChannel = localStorage.getItem('dap_247_last_channel');
  let initialIndex = savedChannel !== null ? parseInt(savedChannel) : Math.floor(Math.random() * TOTAL_CHANNELS);

  applyCCUIState();
  playStation(initialIndex);
</script>
</body>
</html>
