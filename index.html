<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <link rel="manifest" href="manifest.json">
  <style>
    body { background: #000; color: #fff; font-family: sans-serif; margin: 0; overflow-x: hidden; }
    #brand { text-align: center; color: #FFD700; font-size: clamp(18px, 4vw, 24px); font-weight: bold; padding: 10px; }
    #channel-display { text-align: center; color: #FFD700; background: #000; padding: 8px; font-weight: bold; font-size: clamp(14px, 3vw, 18px); border-bottom: 2px solid #FFD700; }
    
    .video-container { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; overflow: hidden; }
    
    #category-badge {
        position: absolute; top: 15px; left: 15px; z-index: 2147483647;
        background: transparent !important; color: #FFD700;
        padding: 5px 10px; font-size: clamp(12px, 2vw, 14px); font-weight: bold;
        text-transform: uppercase; text-shadow: 2px 2px 4px #000;
        pointer-events: none;
    }

    #fs-channel-title {
        position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        z-index: 2147483646; color: #FFD700; font-weight: bold;
        text-shadow: 2px 2px 8px #000; opacity: 0; transition: opacity 0.5s;
        pointer-events: none; text-align: center; width: 90%; white-space: nowrap;
        font-size: clamp(14px, 5vw, 28px);
    }
    
    /* Subtitle Display Overlay (Clean gold text with no background box) */
    #subtitle-overlay {
      position: absolute; bottom: 65px; left: 50%; transform: translateX(-50%);
      z-index: 2147483646; color: #FFD700; background: transparent;
      padding: 0; font-size: clamp(14px, 3vw, 22px); font-weight: bold;
      text-align: center; max-width: 90%; display: none;
      pointer-events: none; text-shadow: 2px 2px 6px #000, 0 0 2px #000; line-height: 1.4;
      white-space: pre-line;
    }
    .video-container.cc-active #subtitle-overlay { display: block; }
    
    /* Transient Fullscreen Navigation & Controls Overlay */
    .fs-nav { 
        position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); 
        z-index: 2147483647; display: flex; gap: 10px; align-items: center;
        opacity: 0; visibility: hidden; transition: opacity 0.4s ease-in-out, visibility 0.4s ease-in-out; 
    }
    .video-container.active-user .fs-nav { opacity: 1; visibility: visible; }
    
    .fs-btn { background: #FFD700 !important; color: #000 !important; border: none; padding: 8px 14px; cursor: pointer; font-weight: bold; border-radius: 4px; font-size: clamp(10px, 1.8vw, 14px); box-shadow: 0 2px 8px rgba(0,0,0,0.8); }
    .fs-btn:hover { background: #fff !important; }

    .nav-box { display: flex; justify-content: space-between; padding: 10px; }
    .nav-btn { background: #FFD700; color: #000; border: none; padding: 12px 24px; cursor: pointer; font-weight: bold; width: 48%; border-radius: 4px; }
    
    /* Custom Control Toggles Panel */
    .controls-panel { display: flex; justify-content: center; gap: 10px; margin: 5px auto; }
    .ctrl-action-btn { background: #333; color: #FFD700; border: 1px solid #FFD700; padding: 8px 16px; cursor: pointer; font-weight: bold; border-radius: 4px; font-size: 14px; }
    .ctrl-action-btn:hover { background: #FFD700; color: #000; }

    /* Invisible Shield Overlay to completely intercept clicks and prevent Dailymotion overlays from triggering */
    #click-shield {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 2147483645; background: transparent; display: none;
    }
    .video-container.fullscreen-mode #click-shield { display: block; }
    .video-container.fullscreen-mode.active-user #click-shield { pointer-events: none; }

    /* Now Playing Ticker Section with Marquee Scrolling */
    #now-playing-section {
      background: #111;
      border-top: 2px solid #FFD700;
      border-bottom: 2px solid #FFD700;
      padding: 12px 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 5px;
      overflow: hidden;
    }

    .marquee-container {
      overflow: hidden;
      white-space: nowrap;
      flex-grow: 1;
      margin-right: 15px;
      position: relative;
    }

    #now-playing-label {
      display: inline-block;
      color: #fff;
      font-size: clamp(13px, 2.5vw, 16px);
      font-weight: bold;
      padding-left: 100%;
      animation: marquee 15s linear infinite;
    }

    @keyframes marquee {
      0% { transform: translate(0, 0); }
      100% { transform: translate(-100%, 0); }
    }

    .live-feed-badge {
      display: flex;
      align-items: center;
      background: #222;
      border: 1px solid #444;
      padding: 6px 10px;
      border-radius: 20px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .live-dot {
      width: 10px;
      height: 10px;
      background-color: #ff3b30;
      border-radius: 50%;
      margin-right: 6px;
      box-shadow: 0 0 8px #ff3b30;
      animation: pulse-red 1.5s infinite;
    }

    @keyframes pulse-red {
      0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.7); }
      70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(255, 59, 48, 0); }
      100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 59, 48, 0); }
    }

    .live-text {
      color: #FFD700;
      font-size: clamp(10px, 2vw, 12px);
      font-weight: bold;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>

<div id="brand">D.A.P TV 24/7</div>
<div id="channel-display">Loading Stream...</div>

<div id="player-wrapper" class="video-container">
  <div id="category-badge">D.A.P TV 24/7</div>
  <div id="fs-channel-title">Stream Name</div>
  <div id="subtitle-overlay"></div>
  <div id="click-shield"></div>
  
  <!-- Transient Fullscreen Navigation, CC & Exit Box -->
  <div class="fs-nav">
      <button class="fs-btn" onclick="nav(-1)">PREV</button>
      <button class="fs-btn" id="fs-cc-toggle-btn" onclick="toggleCC()">CC: ON</button>
      <button class="fs-btn" onclick="toggleFullScreen()">EXIT</button>
      <button class="fs-btn" onclick="nav(1)">NEXT</button>
  </div>

  <div id="player-container" style="width:100%; height:100%; position:relative;">
    <iframe id="dm-player" frameborder="0" width="100%" height="100%" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen style="position:absolute; top:0; left:0; width:100%; height:100%;"></iframe>
  </div>
</div>

<div class="controls-panel">
  <button id="fs-toggle-btn" class="ctrl-action-btn" onclick="toggleFullScreen()">FULLSCREEN</button>
  <button id="main-cc-toggle-btn" class="ctrl-action-btn" onclick="toggleCC()">CC: ON</button>
</div>

<div class="nav-box">
  <button class="nav-btn" onclick="nav(-1)">PREVIOUS</button>
  <button class="nav-btn" onclick="nav(1)">NEXT</button>
</div>

<div id="now-playing-section">
  <div class="marquee-container">
    <div id="now-playing-label">Playing: Loading...</div>
  </div>
  <div class="live-feed-badge">
    <div class="live-dot"></div>
    <span class="live-text">D.A.P TV 24/7 FEED</span>
  </div>
</div>

<script>
  if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

  const display = document.getElementById('channel-display');
  const nowPlayingLabel = document.getElementById('now-playing-label');
  const titleOverlay = document.getElementById('fs-channel-title');
  const subtitleOverlay = document.getElementById('subtitle-overlay');
  const iframe = document.getElementById('dm-player');
  const wrapper = document.getElementById('player-wrapper');
  const mainCcBtn = document.getElementById('main-cc-toggle-btn');
  const fsCcBtn = document.getElementById('fs-cc-toggle-btn');
  
  // Complete Subtitles Database mapped directly to Nasty Old People's Video ID
  const subtitlesData = {
    "k2onvpqu5aRLmUHWMR4": [
      { start: 11, end: 20, text: "Danish translation by Michael Wahlstrøm" },
      { start: 89, end: 91, text: "- Isn't it beautiful?\n- What the hell are you doing home?" },
      { start: 96, end: 101, text: "Have you ever seen anything so luxurious?" },
      { start: 111, end: 114, text: "My name is Mette" },
      { start: 116, end: 119, text: "I am nineteen" },
      { start: 126, end: 131, text: "When I was thirteen, I became a Nazi" },
      { start: 139, end: 143, text: "Everyone loves me" },
      { start: 144, end: 150, text: "Because they can come from both sides,\nso we'll position two here - and here" },
      { start: 152, end: 155, text: "So it goes without saying that they will attack from behind" },
      { start: 156, end: 159, text: "The people I take care of..." },
      { start: 162, end: 168, text: "Here! Highest risk of attack,\nhere we are most vulnerable" },
      { start: 171, end: 174, text: "The ones I have trouble with" },
      { start: 174, end: 177, text: "Maybe Mette wants to give a speech instead?" },
      { start: 177, end: 179, text: "Of course I want to give a speech" },
      { start: 180, end: 183, text: "They impress me" },
      { start: 190, end: 192, text: "But most of all..." },
      { start: 192, end: 196, text: "...Colleagues in home care" },
      { start: 198, end: 202, text: "I gladly take care of elderly people whom no one else bothers to help" },
      { start: 204, end: 217, text: "- Look what it did to me\n- Welcome to reality" },
      { start: 220, end: 223, text: "Gathering at eight o'clock?!" },
      { start: 226, end: 231, text: "The first time I met Martha,\nshe was afraid of almost everything" },
      { start: 232, end: 236, text: "Of the man who delivers the newspapers" },
      { start: 240, end: 241, text: "...Of the birds" },
      { start: 244, end: 247, text: "Of slipping on the rug..." },
      { start: 250, end: 253, text: "...Of men" },
      { start: 257, end: 260, text: "But most of all...\n...Of the home care service poisoning her" },
      { start: 267, end: 270, text: "Open your mouth now, wide!" },
      { start: 274, end: 278, text: "Behind the middle door... lives Elsie" },
      { start: 280, end: 284, text: "Elsie is almost a hundred years old" },
      { start: 286, end: 290, text: "Elsie is mean to almost everyone" },
      { start: 291, end: 299, text: "To the man who delivers the newspapers...\n...To children on the playground" },
      { start: 304, end: 311, text: "To the home care helper\nDo you know what it means? The little one is dead! Abortion!" },
      { start: 318, end: 330, text: "But she is very unpleasant to Mr. W,\nwho lives behind the window opposite" },
      { start: 333, end: 337, text: "Mr. W has been writing a book for twenty years" },
      { start: 339, end: 343, text: "When he got to the last page, ...he got cancer" },
      { start: 348, end: 351, text: "Therefore, he is very bitter" },
      { start: 360, end: 363, text: "At those who can live" },
      { start: 366, end: 371, text: "But most of all... because he needs home care even though he is only 49 years old" }
    ]
  };

  // Master Network Catalog: All titles including The Redwood Massacre
  const stationData = [
    { name: "Strive", id: "k4ObpDYw3BipbbHWEW2", duration: 5400, embed: "https://www.dailymotion.com/embed/video/k4ObpDYw3BipbbHWEW2?autoplay=1&mute=1&controls=0&queue-enable=0&sharing-enable=0&related-video=0" },
    { name: "Ink", id: "k1OjGBaUwtLuvrHWG9U", duration: 5400, embed: "https://www.dailymotion.com/embed/video/k1OjGBaUwtLuvrHWG9U?autoplay=1&mute=1&controls=0&queue-enable=0&sharing-enable=0&related-video=0" },
    { name: "THE REDWOOD MASSACRE", id: "k2btb1TuZW82y7HWJ4u", duration: 5400, embed: "https://www.dailymotion.com/embed/video/k2btb1TuZW82y7HWJ4u?autoplay=1&mute=1&controls=0&queue-enable=0&sharing-enable=0&related-video=0" },
    { name: "Nasty Old People", id: "k2onvpqu5aRLmUHWMR4", duration: 5400, embed: "https://www.dailymotion.com/embed/video/k2onvpqu5aRLmUHWMR4?autoplay=1&mute=1&controls=0&queue-enable=0&sharing-enable=0&related-video=0" },
    { name: "Half Empty", id: "k3oEnpPscWIfF8HWOdw", duration: 5400, embed: "https://www.dailymotion.com/embed/video/k3oEnpPscWIfF8HWOdw?autoplay=1&mute=1&controls=0&queue-enable=0&sharing-enable=0&related-video=0" },
    { name: "Artifacts Of Idealism", id: "k7iwKjmDYVxYRSHWR4q", duration: 5400, embed: "https://www.dailymotion.com/embed/video/k7iwKjmDYVxYRSHWR4q?autoplay=1&mute=1&controls=0&queue-enable=0&sharing-enable=0&related-video=0" },
    { name: "Tiger", id: "k5q4oSCRSb8wg7HWT2S", duration: 5400, embed: "https://www.dailymotion.com/embed/video/k5q4oSCRSb8wg7HWT2S?autoplay=1&mute=1&controls=0&queue-enable=0&sharing-enable=0&related-video=0" },
    { name: "Pioneer One: Ep. 1", id: "k3yLmn40bkRQJtHYsZE", duration: 2400, embed: "https://www.dailymotion.com/embed/video/k3yLmn40bkRQJtHYsZE?autoplay=1&mute=1&controls=0&queue-enable=0&sharing-enable=0&related-video=0" },
    { name: "Pioneer One: Ep. 2", id: "k2bedAe74dcpEQHYtX8", duration: 2400, embed: "https://www.dailymotion.com/embed/video/k2bedAe74dcpEQHYtX8?autoplay=1&mute=1&controls=0&queue-enable=0&sharing-enable=0&related-video=0" }
  ];

  let currentIndex = 0;
  const GLOBAL_EPOCH_KEY = 'dap_247_global_broadcast_epoch';
  const TOTAL_CHANNELS = stationData.length;

  // Clear stale cached epoch data so the browser forces a clean refresh of the full index list
  if (!localStorage.getItem('dap_247_catalog_fix_v2')) {
    localStorage.removeItem(GLOBAL_EPOCH_KEY);
    localStorage.setItem('dap_247_catalog_fix_v2', 'true');
  }

  // Continuous 24/7 Global Timeline Engine: Keeps a permanent, un-interruptible master clock running forward like live TV.
  function getLiveVirtualTimeline(channelIndex) {
    let masterEpochs = JSON.parse(localStorage.getItem(GLOBAL_EPOCH_KEY)) || {};
    let now = Math.floor(Date.now() / 1000);

    if (!masterEpochs[channelIndex]) {
      masterEpochs[channelIndex] = {
        catalogIdx: channelIndex % stationData.length,
        startTime: now
      };
      localStorage.setItem(GLOBAL_EPOCH_KEY, JSON.stringify(masterEpochs));
    }

    let channelProg = masterEpochs[channelIndex];
    if (channelProg.catalogIdx >= stationData.length) {
      channelProg.catalogIdx = 0;
    }
    
    let currentStation = stationData[channelProg.catalogIdx];
    let elapsedTotal = now - channelProg.startTime;

    while (elapsedTotal >= currentStation.duration) {
      elapsedTotal -= currentStation.duration;
      channelProg.catalogIdx = (channelProg.catalogIdx + 1) % stationData.length;
      channelProg.startTime = now - elapsedTotal;
      currentStation = stationData[channelProg.catalogIdx];
      localStorage.setItem(GLOBAL_EPOCH_KEY, JSON.stringify(masterEpochs));
    }

    return {
      catalogIdx: channelProg.catalogIdx,
      offset: elapsedTotal
    };
  }

  function applyCCUIState() {
    let btnText = ccEnabled ? "CC: ON" : "CC: OFF";
    mainCcBtn.innerText = btnText;
    fsCcBtn.innerText = btnText;
    
    if (ccEnabled) {
      wrapper.classList.add('cc-active');
    } else {
      wrapper.classList.remove('cc-active');
      subtitleOverlay.innerText = "";
    }
  }

  let ccEnabled = true;

  function toggleCC() {
    ccEnabled = !ccEnabled;
    applyCCUIState();
    if (ccEnabled) {
      updateSubtitles(playbackSeconds);
    } else {
      subtitleOverlay.innerText = "";
    }
  }

  let playbackSeconds = 0;
  let subtitleTimer = null;
  let currentActiveCatalogIdx = 0;

  function updateSubtitles(currentTime) {
    if (!ccEnabled) {
      subtitleOverlay.innerText = "";
      return;
    }
    
    const station = stationData[currentActiveCatalogIdx];
    const cues = subtitlesData[station.id];
    
    if (!cues || cues.length === 0) {
      subtitleOverlay.innerText = "";
      return;
    }

    let activeCue = cues.find(c => currentTime >= c.start && currentTime <= c.end);
    if (activeCue) {
      subtitleOverlay.innerText = activeCue.text;
    } else {
      subtitleOverlay.innerText = "";
    }
  }

  function playStation(channelIndex) {
    currentIndex = channelIndex;
    let liveState = getLiveVirtualTimeline(channelIndex);
    currentActiveCatalogIdx = liveState.catalogIdx;
    
    const station = stationData[currentActiveCatalogIdx];
    playbackSeconds = liveState.offset;
    
    let cleanUrl = `${station.embed}&start=${playbackSeconds}`;
    iframe.src = cleanUrl;
    
    display.innerText = station.name;
    nowPlayingLabel.innerText = "Now Playing: " + station.name;
    
    localStorage.setItem('dap_247_last_channel', channelIndex);
    
    titleOverlay.innerText = station.name;
    titleOverlay.style.opacity = 1;
    setTimeout(() => { titleOverlay.style.opacity = 0; }, 2000);

    clearInterval(subtitleTimer);
    updateSubtitles(playbackSeconds);
    
    subtitleTimer = setInterval(() => {
      playbackSeconds++;
      
      let checkState = getLiveVirtualTimeline(currentIndex);
      if (checkState.catalogIdx !== currentActiveCatalogIdx) {
        playStation(currentIndex);
        return;
      }
      
      updateSubtitles(playbackSeconds);
    }, 1000);
  }

  function nav(direction) {
    let nextIdx = (currentIndex + direction + TOTAL_CHANNELS) % TOTAL_CHANNels;
    playStation(nextIdx);
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === "ArrowUp" || e.key === "ArrowLeft") { e.preventDefault(); nav(-1); }
    if (e.key === "ArrowDown" || e.key === "ArrowRight") { e.preventDefault(); nav(1); }
  });

  function toggleFullScreen() {
    if (!document.fullscreenElement && !document.webkitFullscreenElement) {
      if (wrapper.requestFullscreen) {
        wrapper.requestFullscreen();
      } else if (wrapper.webkitRequestFullscreen) {
        wrapper.webkitRequestFullscreen();
      }
    } else {
      if (document.exitFullscreen) {
        document.exitFullscreen();
      } else if (wrapper.webkitExitFullscreen) {
        wrapper.webkitExitFullscreen();
      }
    }
  }

  function checkFullscreen() {
    if (document.fullscreenElement || document.webkitFullscreenElement) {
        wrapper.classList.add('fullscreen-mode');
        triggerActivity();
    } else {
        wrapper.classList.remove('fullscreen-mode');
        wrapper.classList.remove('active-user');
    }
  }

  document.addEventListener('fullscreenchange', checkFullscreen);
  document.addEventListener('webkitfullscreenchange', checkFullscreen);

  let fadeTimer = null;
  function triggerActivity() {
    if (document.fullscreenElement || document.webkitFullscreenElement) {
      wrapper.classList.add('active-user');
      clearTimeout(fadeTimer);
      fadeTimer = setTimeout(() => {
        wrapper.classList.remove('active-user');
      }, 3000);
    }
  }

  wrapper.addEventListener('mousemove', triggerActivity);
  wrapper.addEventListener('mousedown', triggerActivity);
  wrapper.addEventListener('touchstart', triggerActivity, { passive: true });

  const savedChannel = localStorage.getItem('dap_247_last_channel');
  let initialIndex = savedChannel !== null ? parseInt(savedChannel) : Math.floor(Math.random() * TOTAL_CHANNELS);

  applyCCUIState();
  playStation(initialIndex);
</script>
</body>
</html>
