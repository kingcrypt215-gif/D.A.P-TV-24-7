<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <link rel="manifest" href="manifest.json">
  <style>
    body { background: #000; color: #fff; font-family: sans-serif; margin: 0; overflow-x: hidden; }
    #brand { text-align: center; color: #FFD700; font-size: clamp(18px, 4vw, 24px); font-weight: bold; padding: 10px; }
    #channel-display { text-align: center; color: #FFD700; background: #000; padding: 8px; font-weight: bold; font-size: clamp(14px, 3vw, 18px); border-bottom: 2px solid #FFD700; }
    
    .video-container { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; overflow: hidden; }
    
    #category-badge {
        position: absolute; top: 10px; left: 10px; z-index: 2147483647;
        background: transparent !important; color: #FFD700;
        padding: 5px 10px; font-size: clamp(12px, 2vw, 14px); font-weight: bold;
        text-transform: uppercase; text-shadow: 2px 2px 4px #000;
        pointer-events: none;
    }

    #fs-channel-title {
        position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        z-index: 2147483646; color: #FFD700; font-weight: bold;
        text-shadow: 2px 2px 8px #000; opacity: 0; transition: opacity 0.5s;
        pointer-events: none; text-align: center; width: 90%; white-space: nowrap;
        font-size: clamp(14px, 5vw, 28px);
    }
    
    .fs-nav { 
        position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); 
        z-index: 2147483647; display: none; gap: 10px; opacity: 0; transition: opacity 0.3s; 
    }
    
    .fs-btn { background: #FFD700 !important; color: #000 !important; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; border-radius: 4px; }

    .nav-box { display: flex; justify-content: space-between; padding: 10px; }
    .nav-btn { background: #FFD700; color: #000; border: none; padding: 12px 24px; cursor: pointer; font-weight: bold; width: 48%; border-radius: 4px; }
    
    /* Now Playing Ticker Section */
    #now-playing-section {
      background: #111;
      border-top: 2px solid #FFD700;
      border-bottom: 2px solid #FFD700;
      padding: 12px 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
    }

    #now-playing-label {
      color: #fff;
      font-size: clamp(13px, 2.5vw, 16px);
      font-weight: bold;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-right: 10px;
    }

    .live-feed-badge {
      display: flex;
      align-items: center;
      background: #222;
      border: 1px solid #444;
      padding: 6px 10px;
      border-radius: 20px;
      white-space: nowrap;
    }

    .live-dot {
      width: 10px;
      height: 10px;
      background-color: #ff3b30;
      border-radius: 50%;
      margin-right: 6px;
      box-shadow: 0 0 8px #ff3b30;
      animation: pulse-red 1.5s infinite;
    }

    @keyframes pulse-red {
      0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.7); }
      70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(255, 59, 48, 0); }
      100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 59, 48, 0); }
    }

    .live-text {
      color: #FFD700;
      font-size: clamp(10px, 2vw, 12px);
      font-weight: bold;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>

<div id="brand">D.A.P TV 24/7</div>
<div id="channel-display">Select a Stream</div>
<div id="player-wrapper" class="video-container">
  <div id="category-badge">D.A.P TV 24/7</div>
  <div id="fs-channel-title">Stream Name</div>
  <div class="fs-nav">
      <button class="fs-btn" onclick="nav(-1)">PREV</button>
      <button class="fs-btn" onclick="nav(1)">NEXT</button>
  </div>
  <div id="player-container" style="width:100%; height:100%; position:relative;">
    <iframe id="dm-player" frameborder="0" width="100%" height="100%" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen style="position:absolute; top:0; left:0; width:100%; height:100%;"></iframe>
  </div>
</div>

<div class="nav-box">
  <button class="nav-btn" onclick="nav(-1)">PREVIOUS</button>
  <button class="nav-btn" onclick="nav(1)">NEXT</button>
</div>

<div id="now-playing-section">
  <div id="now-playing-label">Playing: Loading...</div>
  <div class="live-feed-badge">
    <div class="live-dot"></div>
    <span class="live-text">D.A.P TV 24/7 FEED</span>
  </div>
</div>

<script src="https://akt.dailymotion.com/sdk.js"></script>
<script>
  if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

  const display = document.getElementById('channel-display');
  const nowPlayingLabel = document.getElementById('now-playing-label');
  const titleOverlay = document.getElementById('fs-channel-title');
  const iframe = document.getElementById('dm-player');
  const wrapper = document.getElementById('player-wrapper');
  const badge = document.getElementById('category-badge');
  const fsNav = document.querySelector('.fs-nav');
  
  const streamData = [
    { name: "Strive", id: "k4ObpDYw3BipbbHWEW2", url: "https://www.dailymotion.com/embed/video/k4ObpDYw3BipbbHWEW2?autoplay=1" },
    { name: "Ink", id: "k1OjGBaUwtLuvrHWG9U", url: "https://www.dailymotion.com/embed/video/k1OjGBaUwtLuvrHWG9U?autoplay=1" },
    { name: "THE REDWOOD MASSACRE", id: "k2btb1TuZW82y7HWJ4u", url: "https://www.dailymotion.com/embed/video/k2btb1TuZW82y7HWJ4u?autoplay=1" },
    { name: "Nasty Old People", id: "k2onvpqu5aRLmUHWMR4", url: "https://www.dailymotion.com/embed/video/k2onvpqu5aRLmUHWMR4?autoplay=1" },
    { name: "Half Empty", id: "k3oEnpPscWIfF8HWOdw", url: "https://www.dailymotion.com/embed/video/k3oEnpPscWIfF8HWOdw?autoplay=1" },
    { name: "Artifacts Of Idealism", id: "k7iwKjmDYVxYRSHWR4q", url: "https://www.dailymotion.com/embed/video/k7iwKjmDYVxYRSHWR4q?autoplay=1" },
    { name: "Tiger", id: "k5q4oSCRSb8wg7HWT2S", url: "https://www.dailymotion.com/embed/video/k5q4oSCRSb8wg7HWT2S?autoplay=1" }
  ];

  let currentIndex = 0;
  let dmPlayerInstance = null;

  function playChannel(index) {
    currentIndex = index;
    const stream = streamData[index];
    iframe.src = stream.url;
    
    display.innerText = (index + 1) + ". " + stream.name;
    nowPlayingLabel.innerText = "Now Playing: " + stream.name;
    
    localStorage.setItem('dap_247_last_channel', index);
    localStorage.setItem('dap_247_last_active', Date.now());
    
    titleOverlay.innerText = (index + 1) + ". " + stream.name;
    titleOverlay.style.opacity = 1;
    setTimeout(() => { titleOverlay.style.opacity = 0; }, 2000);

    if (window.dailymotion) {
      if (dmPlayerInstance) {
        try { dmPlayerInstance.destroy(); } catch(e) {}
      }
      try {
        dmPlayerInstance = dailymotion.player(iframe, {
          video: stream.id,
          params: { autoplay: 1 }
        });
        dmPlayerInstance.on('end', () => {
          playRandomNext();
        });
      } catch (err) {
        console.log("SDK init fallback", err);
      }
    }
  }

  function playRandomNext() {
    let nextIdx;
    do {
      nextIdx = Math.floor(Math.random() * streamData.length);
    } while (nextIdx === currentIndex && streamData.length > 1);
    
    playChannel(nextIdx);
  }

  function nav(direction) {
    let currentIdx = parseInt(localStorage.getItem('dap_247_last_channel')) || 0;
    currentIdx = (currentIdx + direction + streamData.length) % streamData.length;
    playChannel(currentIdx);
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === "ArrowUp" || e.key === "ArrowLeft") { e.preventDefault(); nav(-1); }
    if (e.key === "ArrowDown" || e.key === "ArrowRight") { e.preventDefault(); nav(1); }
  });

  ['click', 'keydown', 'touchstart'].forEach(event => {
    document.addEventListener(event, () => {
      localStorage.setItem('dap_247_last_active', Date.now());
    }, { passive: true });
  });

  function checkFullscreen() {
    if (document.fullscreenElement || document.webkitFullscreenElement) {
        iframe.parentNode.appendChild(badge);
        iframe.parentNode.appendChild(titleOverlay);
        iframe.parentNode.appendChild(fsNav);
        fsNav.style.display = 'flex';
        setTimeout(() => { fsNav.style.opacity = '1'; }, 50);
    } else {
        wrapper.appendChild(badge);
        wrapper.appendChild(titleOverlay);
        wrapper.appendChild(fsNav);
        fsNav.style.display = 'none';
        fsNav.style.opacity = '0';
    }
  }

  document.addEventListener('fullscreenchange', checkFullscreen);
  document.addEventListener('webkitfullscreenchange', checkFullscreen);

  const TIMEOUT_LIMIT = 60 * 60 * 1000; 
  const savedChannel = localStorage.getItem('dap_247_last_channel');
  const lastActiveTime = localStorage.getItem('dap_247_last_active');
  const now = Date.now();
  
  let initialIndex;
  
  if (savedChannel !== null && lastActiveTime !== null) {
    const elapsedInactiveTime = now - parseInt(lastActiveTime);
    if (elapsedInactiveTime > TIMEOUT_LIMIT) {
      initialIndex = Math.floor(Math.random() * streamData.length);
    } else {
      initialIndex = parseInt(savedChannel);
    }
  } else {
    initialIndex = Math.floor(Math.random() * streamData.length);
  }
  
  playChannel(initialIndex);
</script>
</body>
</html>
